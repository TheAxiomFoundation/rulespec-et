format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: et/statute/proc-1395-2025/income-tax-amendment-2025
    upstream_source_check:
      status: checked_higher_authority
      checked_paths:
        - et/statute/proc-979-2016/federal-income-tax-proclamation
      rationale: The amendment directly substitutes Article 11 of the Federal Income Tax Proclamation No. 979/2016; the principal act was checked for the employment-income base context, while the amended rates and thresholds are set by this statute.
  summary: |-
    Article 11 is deleted and replaced by “11. Employment Income Tax Rates”: monthly employment income is taxed at 0% for 0-2,000 Birr, 15% for 2,001-4,000, 20% for 4,001-7,000, 25% for 7,001-10,000, 30% for 10,001-14,000, and 35% over 14,000. Article 19 is likewise substituted with the annual business-income mirror schedule (0% to 24,000; 15% to 48,000; 20% to 84,000; 25% to 120,000; 30% to 168,000; 35% above). Article 50 sets the Category "B" gross-receipts (presumptive) schedule - 2% to 100,000; 3% to 500,000; 5% to 1,000,000; 7% to 1,500,000; 9% to less than 2,000,000 - applicable under the Article 49 total gross revenue tax regime (Article 3: Category "A" = a body or annual turnover exceeding Birr 2,000,000). Article 23 introduces the Minimum Alternative Tax: where tax payable falls below 2.5% of turnover the taxpayer pays a minimum tax of 2.5% of turnover, REDUCED by the business income tax paid (sub-article 3 - a floor), and the Article does not apply to taxpayers under the Article 49 gross revenue regime (sub-article 4). The effective-date article states that, subject to the special dates for alternative minimum tax and Schedule D/withholding, all other provisions apply to income derived as of July 8, 2025.
