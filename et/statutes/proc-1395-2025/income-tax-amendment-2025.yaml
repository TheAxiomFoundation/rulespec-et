  - name: minimum_alternative_tax_top_up
    kind: derived
    entity: Person
    dtype: Money
    unit: ETB
    period: Year
    source: Article 23 - the minimum tax (2.5% of turnover) is reduced by the business income tax paid (sub-article 3, a floor) and does not apply to Article 49 gross-revenue-regime taxpayers (sub-article 4)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: et/statute/proc-1395-2025/income-tax-amendment-2025
              excerpt: "shall be reduced by business income tax under Article 18 paid in the tax year"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: et/statute/proc-1395-2025/income-tax-amendment-2025
              excerpt: "shall not apply to a taxpayer under the total gross revenue tax regime set out in Article 49"
    versions:
      - effective_from: '2025-07-08'
        formula: |-
          if annual_gross_receipts > category_a_turnover_bound: max(0, minimum_alternative_tax_rate * annual_gross_receipts - business_income_tax_scheduled) else: 0

  - name: business_income_tax_payable
    kind: derived
    entity: Person
    dtype: Money
    unit: ETB
    period: Year
    source: Article 19 scheduled tax plus the Article 23 minimum-tax top-up (the statutory floor)
    metadata:
