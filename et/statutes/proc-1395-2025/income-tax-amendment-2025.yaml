          + employment_income_third_taxable_band_rate * max(0, min(taxable_business_income, business_income_third_taxable_band_upper_bound) - business_income_second_taxable_band_upper_bound)
          + employment_income_fourth_taxable_band_rate * max(0, min(taxable_business_income, business_income_fourth_taxable_band_upper_bound) - business_income_third_taxable_band_upper_bound)
          + employment_income_top_band_rate * max(0, taxable_business_income - business_income_fourth_taxable_band_upper_bound)

