  - name: presumptive_gross_receipts_tax
    kind: derived
    entity: Person
    dtype: Money
    unit: ETB
    period: Year
    source: Article 50 schedule under the Article 49 total gross revenue tax regime (Category "B" - annual gross receipts below the Category "A" bound)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: et/statute/proc-1395-2025/income-tax-amendment-2025
              excerpt: "0- 100,000 2% 100,001 — 500,000 3% 500,001 — 1,000,000 5% 1,000,001 — 1,500,000 7%"
    versions:
      - effective_from: '2025-07-08'
        formula: |-
          if annual_gross_receipts <= category_a_turnover_bound: presumptive_first_band_rate * max(0, min(annual_gross_receipts, presumptive_first_band_upper_bound))
          + presumptive_second_band_rate * max(0, min(annual_gross_receipts, presumptive_second_band_upper_bound) - presumptive_first_band_upper_bound)
          + presumptive_third_band_rate * max(0, min(annual_gross_receipts, presumptive_third_band_upper_bound) - presumptive_second_band_upper_bound)
          + presumptive_fourth_band_rate * max(0, min(annual_gross_receipts, presumptive_fourth_band_upper_bound) - presumptive_third_band_upper_bound)
          + presumptive_top_band_rate * max(0, annual_gross_receipts - presumptive_fourth_band_upper_bound) else: 0

