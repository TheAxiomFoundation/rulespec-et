  - name: employment_income_tax
    kind: derived
    entity: Person
    dtype: Money
    unit: ETB
    period: Month
    source: Article 11 employment income tax rates
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: et/statute/proc-1395-2025/income-tax-amendment-2025
              excerpt: "The monthly rate of employment income tax is"
          - path: versions[0].effective_from
            kind: effective_period
            source:
              corpus_citation_path: et/statute/proc-1395-2025/income-tax-amendment-2025
              excerpt: "income derived as of July’8/2025"
    versions:
      - effective_from: '2025-07-08'
        formula: |-
          employment_income_first_taxable_band_rate * max(0, min(monthly_employment_income, employment_income_first_taxable_band_upper_bound) - employment_income_zero_rate_upper_bound)
          + employment_income_second_taxable_band_rate * max(0, min(monthly_employment_income, employment_income_second_taxable_band_upper_bound) - employment_income_first_taxable_band_upper_bound)
          + employment_income_third_taxable_band_rate * max(0, min(monthly_employment_income, employment_income_third_taxable_band_upper_bound) - employment_income_second_taxable_band_upper_bound)
          + employment_income_fourth_taxable_band_rate * max(0, min(monthly_employment_income, employment_income_fourth_taxable_band_upper_bound) - employment_income_third_taxable_band_upper_bound)
          + employment_income_top_band_rate * max(0, monthly_employment_income - employment_income_fourth_taxable_band_upper_bound)

