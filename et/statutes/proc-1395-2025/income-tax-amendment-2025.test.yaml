# Companion fixtures for Proclamation No. 1395/2025 (rulespec-et#1
# instruments 1-3). Employment cases are monthly (the statutory
# schedule is monthly); business and presumptive cases are annual.
# Hand arithmetic; the 3,407.11 and 17,035.56 cases reproduce live
# ETMOD probes to the cent (comparison values only, never sources).
# The MAT cases encode the STATUTORY floor (Article 23(3) reduction);
# ETMOD adds the full 2.5% instead - rulespec-et#1 finding 1.

- name: employment_exempt_bound
  period:
    period_kind: month
    start: '2025-08-01'
    end: '2025-08-31'
  input:
    et:statutes/proc-1395-2025/income-tax-amendment-2025#input.monthly_employment_income: 2000
  output:
    et:statutes/proc-1395-2025/income-tax-amendment-2025#employment_income_tax: 0

- name: employment_second_band_interior
  # 15% x 1,000 = 150.
  period:
    period_kind: month
    start: '2025-08-01'
    end: '2025-08-31'
  input:
    et:statutes/proc-1395-2025/income-tax-amendment-2025#input.monthly_employment_income: 3000
  output:
    et:statutes/proc-1395-2025/income-tax-amendment-2025#employment_income_tax: 150

- name: employment_probe_cross_check_low
  # Live ETMOD probe: 3,407.11 -> 211.07 (211.0665).
  period:
    period_kind: month
    start: '2025-08-01'
    end: '2025-08-31'
  input:
    et:statutes/proc-1395-2025/income-tax-amendment-2025#input.monthly_employment_income: 3407.11
  output:
    et:statutes/proc-1395-2025/income-tax-amendment-2025#employment_income_tax: 211.0665

- name: employment_top_of_thirty_band
  # 300 + 600 + 750 + 1,200 = 2,850 at 14,000.
  period:
    period_kind: month
    start: '2025-08-01'
    end: '2025-08-31'
  input:
    et:statutes/proc-1395-2025/income-tax-amendment-2025#input.monthly_employment_income: 14000
  output:
    et:statutes/proc-1395-2025/income-tax-amendment-2025#employment_income_tax: 2850

- name: employment_probe_cross_check_high
  # Live ETMOD probe: 17,035.56 -> 3,912.44 (2,850 + 35% x 3,035.56 = 3,912.446).
  period:
    period_kind: month
    start: '2025-08-01'
    end: '2025-08-31'
  input:
    et:statutes/proc-1395-2025/income-tax-amendment-2025#input.monthly_employment_income: 17035.56
  output:
    et:statutes/proc-1395-2025/income-tax-amendment-2025#employment_income_tax: 3912.446

- name: employment_zero
  period:
    period_kind: month
    start: '2025-08-01'
    end: '2025-08-31'
  input:
    et:statutes/proc-1395-2025/income-tax-amendment-2025#input.monthly_employment_income: 0
  output:
    et:statutes/proc-1395-2025/income-tax-amendment-2025#employment_income_tax: 0

- name: business_schedule_high_income
  # Annual mirror schedule at 1,200,000: 3,600+7,200+9,000+14,400+361,200 = 395,400;
  # receipts 3,000,000 -> MAT floor 75,000 < 395,400 -> top-up 0.
  period:
    period_kind: tax_year
    start: '2025-07-08'
    end: '2026-07-07'
  input:
    et:statutes/proc-1395-2025/income-tax-amendment-2025#input.taxable_business_income: 1200000
    et:statutes/proc-1395-2025/income-tax-amendment-2025#input.annual_gross_receipts: 3000000
  output:
    et:statutes/proc-1395-2025/income-tax-amendment-2025#business_income_tax_scheduled: 395400
    et:statutes/proc-1395-2025/income-tax-amendment-2025#minimum_alternative_tax_top_up: 0
    et:statutes/proc-1395-2025/income-tax-amendment-2025#business_income_tax_payable: 395400

- name: business_mat_floor_binds
  # Scheduled on 60,000 = 3,600 + 20% x 12,000 = 6,000; floor 2.5% x 3,000,000
  # = 75,000 -> top-up 69,000 -> payable 75,000 (the statutory floor; ETMOD
  # returns 81,000 here - finding 1).
  period:
    period_kind: tax_year
    start: '2025-07-08'
    end: '2026-07-07'
  input:
    et:statutes/proc-1395-2025/income-tax-amendment-2025#input.taxable_business_income: 60000
    et:statutes/proc-1395-2025/income-tax-amendment-2025#input.annual_gross_receipts: 3000000
  output:
    et:statutes/proc-1395-2025/income-tax-amendment-2025#business_income_tax_scheduled: 6000
    et:statutes/proc-1395-2025/income-tax-amendment-2025#minimum_alternative_tax_top_up: 69000
    et:statutes/proc-1395-2025/income-tax-amendment-2025#business_income_tax_payable: 75000

- name: business_below_category_a_no_mat
  # Receipts 50,000 <= 2,000,000: Article 23(4) excludes the Article 49
  # regime -> no MAT (ETMOD levies 1,250 here - finding 2).
  period:
    period_kind: tax_year
    start: '2025-07-08'
    end: '2026-07-07'
  input:
    et:statutes/proc-1395-2025/income-tax-amendment-2025#input.taxable_business_income: 30000
    et:statutes/proc-1395-2025/income-tax-amendment-2025#input.annual_gross_receipts: 50000
  output:
    et:statutes/proc-1395-2025/income-tax-amendment-2025#business_income_tax_scheduled: 900
    et:statutes/proc-1395-2025/income-tax-amendment-2025#minimum_alternative_tax_top_up: 0
    et:statutes/proc-1395-2025/income-tax-amendment-2025#business_income_tax_payable: 900

