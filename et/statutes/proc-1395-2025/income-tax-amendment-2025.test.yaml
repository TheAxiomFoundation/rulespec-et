    start: '2025-07-08'
    end: '2026-07-07'
  input:
    et:statutes/proc-1395-2025/income-tax-amendment-2025#input.annual_gross_receipts: 400000
  output:
    et:statutes/proc-1395-2025/income-tax-amendment-2025#presumptive_gross_receipts_tax: 11000

- name: presumptive_top_band
  # 2,000+12,000+25,000+35,000 + 9% x 400,000 = 110,000.
  period:
    period_kind: tax_year
    start: '2025-07-08'
    end: '2026-07-07'
  input:
    et:statutes/proc-1395-2025/income-tax-amendment-2025#input.annual_gross_receipts: 1900000
  output:
    et:statutes/proc-1395-2025/income-tax-amendment-2025#presumptive_gross_receipts_tax: 110000

- name: presumptive_above_regime
  period:
    period_kind: tax_year
    start: '2025-07-08'
    end: '2026-07-07'
  input:
    et:statutes/proc-1395-2025/income-tax-amendment-2025#input.annual_gross_receipts: 2500000
  output:
    et:statutes/proc-1395-2025/income-tax-amendment-2025#presumptive_gross_receipts_tax: 0
