format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: et/regulation/dir-1021-2024/vat-electricity-water-exemption-directive
    source_sha256: 91c7b7d78591f8421caecda56274e67b5a44a8bf0704b5ae0cfd6a810e95124b
  summary: “Monthly electricity consumption up to 200 kWh” and “Monthly water consumption
    up to 15 cubic meters (excluding bottled water)” for domestic use are exempt from
    Value Added Tax. Suppliers involved in generation and transmission must collect
    and remit VAT on wholesale electricity.
rules:
- name: monthly_domestic_electricity_vat_exempt_consumption_limit
  kind: parameter
  dtype: Decimal
  period: Month
  source: Directive No. 1021/2024, Article 2(1)(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: et/regulation/dir-1021-2024/vat-electricity-water-exemption-directive
          excerpt: Monthly electricity consumption up to 200 kWh
      - path: versions[0].formula
        kind: unit
        source:
          corpus_citation_path: et/regulation/dir-1021-2024/vat-electricity-water-exemption-directive
          excerpt: 200 kWh
  versions:
  - effective_from: '0001-01-01'
    formula: '200'
- name: monthly_domestic_water_vat_exempt_consumption_limit
  kind: parameter
  dtype: Decimal
  period: Month
  source: Directive No. 1021/2024, Article 2(1)(b)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: et/regulation/dir-1021-2024/vat-electricity-water-exemption-directive
          excerpt: Monthly water consumption up to 15 cubic meters
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: et/regulation/dir-1021-2024/vat-electricity-water-exemption-directive
          excerpt: excluding bottled water
  versions:
  - effective_from: '0001-01-01'
    formula: '15'
- name: domestic_electricity_consumption_exempt_from_vat
  kind: derived
  entity: Household
  dtype: Decimal
  period: Month
  source: Directive No. 1021/2024, Article 2(1)(a)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: et/regulation/dir-1021-2024/vat-electricity-water-exemption-directive
          excerpt: 'Exemption from Value Added Tax 1) The following supplies of electricity
            and water for domestic use are exempt from Value Added Tax: a) Monthly
            electricity consumption up to 200 kWh; and b) Monthly water consumption
            up to 15 cubic meters (excluding bottled water).'
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: et/regulation/dir-1021-2024/vat-electricity-water-exemption-directive
          excerpt: Monthly electricity consumption up to 200 kWh
  versions:
  - effective_from: '0001-01-01'
    formula: "min(\n  domestic_electricity_consumption,\n  monthly_domestic_electricity_vat_exempt_consumption_limit\n\
      )"
- name: domestic_water_consumption_exempt_from_vat
  kind: derived
  entity: Household
  dtype: Decimal
  period: Month
  source: Directive No. 1021/2024, Article 2(1)(b)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: formula
        source:
          corpus_citation_path: et/regulation/dir-1021-2024/vat-electricity-water-exemption-directive
          excerpt: 'Exemption from Value Added Tax 1) The following supplies of electricity
            and water for domestic use are exempt from Value Added Tax: a) Monthly
            electricity consumption up to 200 kWh; and b) Monthly water consumption
            up to 15 cubic meters (excluding bottled water).'
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: et/regulation/dir-1021-2024/vat-electricity-water-exemption-directive
          excerpt: excluding bottled water
      - path: versions[0].formula
        kind: amount
        source:
          corpus_citation_path: et/regulation/dir-1021-2024/vat-electricity-water-exemption-directive
          excerpt: Monthly water consumption up to 15 cubic meters
  versions:
  - effective_from: '0001-01-01'
    formula: "min(\n  domestic_water_consumption_excluding_bottled_water,\n  monthly_domestic_water_vat_exempt_consumption_limit\n\
      )"
- name: wholesale_electricity_supply_exempt_from_vat
  kind: derived
  entity: Business
  dtype: Judgment
  period: Month
  source: Directive No. 1021/2024, Article 2(2)
  metadata:
    proof:
      atoms:
      - path: versions[0].formula
        kind: exception
        source:
          corpus_citation_path: et/regulation/dir-1021-2024/vat-electricity-water-exemption-directive
          excerpt: suppliers involved in the generation and transmission of electricity
            are obliged to collect Value Added Tax on wholesale electricity supplied
  versions:
  - effective_from: '0001-01-01'
    formula: 'false'
