format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: et/regulation/dir-1021-2024/vat-electricity-water-exemption-directive
    source_sha256: 91c7b7d78591f8421caecda56274e67b5a44a8bf0704b5ae0cfd6a810e95124b
  summary: |-
    “Monthly electricity consumption up to 200 kWh” and “Monthly water consumption up to 15 cubic meters (excluding bottled water)” for domestic use are exempt from Value Added Tax. Suppliers involved in generation and transmission must collect and remit VAT on wholesale electricity.
rules:
  - name: domestic_electricity_exempt_monthly_consumption_limit
    kind: parameter
    dtype: Decimal
    period: Month
    source: Directive No. 1021/2024, Article 2(1)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: et/regulation/dir-1021-2024/vat-electricity-water-exemption-directive
              excerpt: "Monthly electricity consumption up to 200 kWh"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          200
  - name: domestic_non_bottled_water_exempt_monthly_consumption_limit
    kind: parameter
    dtype: Decimal
    period: Month
    source: Directive No. 1021/2024, Article 2(1)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: amount
            source:
              corpus_citation_path: et/regulation/dir-1021-2024/vat-electricity-water-exemption-directive
              excerpt: "Monthly water consumption up to 15 cubic meters (excluding bottled water)"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          15
  - name: domestic_electricity_consumption_exempt_from_vat
    kind: derived
    entity: Household
    dtype: Decimal
    period: Month
    source: Directive No. 1021/2024, Article 2(1)(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: et/regulation/dir-1021-2024/vat-electricity-water-exemption-directive
              excerpt: "Monthly electricity consumption up to 200 kWh"
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: et/regulation/dir-1021-2024/vat-electricity-water-exemption-directive
              excerpt: "supplies of electricity and water for domestic use"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          min(
            domestic_monthly_electricity_consumption,
            domestic_electricity_exempt_monthly_consumption_limit
          )
  - name: domestic_non_bottled_water_consumption_exempt_from_vat
    kind: derived
    entity: Household
    dtype: Decimal
    period: Month
    source: Directive No. 1021/2024, Article 2(1)(b)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: et/regulation/dir-1021-2024/vat-electricity-water-exemption-directive
              excerpt: "Monthly water consumption up to 15 cubic meters (excluding bottled water)"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: et/regulation/dir-1021-2024/vat-electricity-water-exemption-directive
              excerpt: "excluding bottled water"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          min(
            domestic_monthly_non_bottled_water_consumption,
            domestic_non_bottled_water_exempt_monthly_consumption_limit
          )
  - name: wholesale_electricity_vat_collection_required
    kind: derived
    entity: Business
    dtype: Judgment
    period: Month
    source: Directive No. 1021/2024, Article 2(2)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: condition
            source:
              corpus_citation_path: et/regulation/dir-1021-2024/vat-electricity-water-exemption-directive
              excerpt: "suppliers involved in the generation and transmission of electricity"
          - path: versions[0].formula
            kind: exception
            source:
              corpus_citation_path: et/regulation/dir-1021-2024/vat-electricity-water-exemption-directive
              excerpt: "collect Value Added Tax on wholesale electricity supplied and remit it"
    versions:
      - effective_from: '0001-01-01'
        formula: |-
          supplier_generates_and_transmits_electricity
          and supplier_supplies_wholesale_electricity
